services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: thesis_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: thesis_selection
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Django 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thesis_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-thesis-selection-secret-key-2024
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=thesis_selection
      - DB_USER=root
      - DB_PASSWORD=root123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

volumes:
  mysql_data:
